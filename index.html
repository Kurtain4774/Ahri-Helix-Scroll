<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Helix Scroll</title>
    <link rel="stylesheet" href="./styles.css?v=spirit-blue-1" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js"
        }
      }
    </script>
  </head>
  <body>
    <main class="landing" aria-label="Helix Scroll immersive gallery">
      <div class="scene-shell" aria-hidden="true">
        <canvas id="helix-canvas"></canvas>
      </div>


<section class="music-panel" aria-label="Background music">
        <div class="music-copy">
          <span class="music-kicker">Now playing</span>
          <span class="music-track">Legends Never Die</span>
        </div>
        <button class="music-toggle" type="button" aria-pressed="false" aria-label="Play Legends Never Die">Play</button>
        <audio id="legends-player" class="music-player" src="./assets/Legends%20Never%20Die.mp3" preload="auto" loop autoplay aria-hidden="true"></audio>
      </section>

      <section class="scene-caption" aria-labelledby="page-title">
        <p class="eyebrow">Interactive archive</p>
        <h1 id="page-title">Ahri</h1>
      </section>
    </main>

    <script type="module" src="./script.js?v=spirit-blue-1"></script>
  </body>
</html>
