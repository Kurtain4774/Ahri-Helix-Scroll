<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ahri — Helix Scroll</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='%23190d2e'/><path d='M16 4 Q20 10 16 16 Q12 10 16 4Z' fill='%23d4a0e0'/><path d='M16 16 Q22 14 26 18 Q22 22 16 16Z' fill='%23d4a0e0'/><path d='M16 16 Q10 14 6 18 Q10 22 16 16Z' fill='%23d4a0e0'/><path d='M16 16 Q20 22 18 28 Q14 26 16 16Z' fill='%23d4a0e0'/><path d='M16 16 Q12 22 14 28 Q10 26 16 16Z' fill='%23d4a0e0'/></svg>" />
    <script>
      try {
        const savedTheme = localStorage.getItem("helix-theme") || "helix";
        document.documentElement.dataset.theme = savedTheme;
      } catch {
        // Theme persistence is optional.
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css?v=fox-spirit-20" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <main class="landing" aria-label="Helix Scroll immersive gallery">
      <div class="scene-shell" aria-hidden="true">
        <canvas id="helix-canvas"></canvas>
      </div>

      <form class="theme-panel" id="theme-panel" aria-label="Theme selector">
        <label class="theme-label" for="theme-select">Theme</label>
        <select class="theme-select" id="theme-select" name="theme">
          <option value="helix">Helix</option>
          <option value="spirit">Spirit Blossom</option>
          <option value="arcade">Arcade</option>
          <option value="coven">Coven</option>
          <option value="elderwood">Elderwood</option>
          <option value="kda">K/DA</option>
        </select>
        <button class="theme-apply" type="submit">Apply</button>
      </form>

      <aside class="seek-panel" aria-label="Skin index">
        <p class="seek-title">Skins</p>
        <ul class="seek-list" id="skin-list"></ul>
      </aside>

      <div class="card-dots" id="card-dots" aria-hidden="true"></div>

      <section class="music-panel" aria-label="Background music">
        <div class="music-eq" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
        <div class="music-copy">
          <span class="music-kicker">Tap to play</span>
          <span class="music-track">Legends Never Die</span>
        </div>
        <button class="music-toggle" type="button" aria-pressed="false" aria-label="Play Legends Never Die">▶</button>
        <input class="music-volume" type="range" min="0" max="1" step="0.01" value="0.5" aria-label="Music volume" />
        <audio id="legends-player" class="music-player" src="./assets/Legends%20Never%20Die.mp3" preload="auto" loop aria-hidden="true"></audio>
      </section>

      <section class="scene-caption" aria-labelledby="page-title">
        <p class="eyebrow">The Nine-Tailed Fox</p>
        <h1 id="page-title">Ahri</h1>
      </section>

      <div class="scroll-hint" id="scroll-hint" aria-hidden="true">
        <span class="scroll-hint-label">Scroll</span>
        <div class="scroll-hint-chevron"></div>
      </div>

      <section class="card-detail" id="card-detail" aria-hidden="true">
        <div class="card-detail-inner">
          <img class="card-detail-image" id="cd-image" alt="" />
          <div class="card-detail-meta">
            <h2 class="card-detail-name" id="cd-name"></h2>
            <p class="card-detail-date" id="cd-date"></p>
            <p class="card-detail-price" id="cd-price"></p>
            <button class="card-detail-close" id="cd-close" type="button">
              <span aria-hidden="true">&larr;</span> close
            </button>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="./script.js?v=fox-spirit-18"></script>
  </body>
</html>
